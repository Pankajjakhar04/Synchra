# Redis configuration for Cloud Run
# Optimized for low-cost, persistent state storage

# Network
bind 0.0.0.0
port 6379
timeout 300
tcp-keepalive 60

# Persistence (RDB snapshots)
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# Memory management (256MB Cloud Run instance)
maxmemory 200mb
maxmemory-policy allkeys-lru

# Security - password will be set via environment variable
protected-mode no

# Performance
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Logging
loglevel notice
logfile ""

# Active defragmentation
activedefrag yes
